<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="instadesign.css">
    <title> instagram clone </title>
</head>
<body>
    <div class="container">
        <div class="left">
            <img src="instalogo.jpg" alt="instagram logo" width="200px" height="100px" class="logo">

            <p class="left-para"> See everyday moments from your <span>close friends.</span></p>
            <div class="logo-image">
            <img src="https://static.cdninstagram.com/rsrc.php/yJ/r/53X3pk-t2Gn.webp" alt="" class="image">
             </div>
        </div>

        <hr>

        <div class="right">

            <p class="first"> Log into Instagram</p>

            <div class="details">
                <input type="text" placeholder="Phone number, username or email" class="input">
                <input type="password" placeholder="Password" class="input">
            </div>

            <div class="btn">
                <button class="login-btn"> Log in </button>
                
            </div>
            <div class="forgot-all">
                <span class="forgot">Forgot password?</span>
            </div>
                <div class="other">
                    <p> Log in with Facebook </p>
                    <div>
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTyfI6KOy4SC36COdkZmrbfTfiztXOrvQIt5g&s" alt="" class="facebook-logo">
                    </div>
                </div>

                <div class="last">
                    <p> Create new account </p>
                
                </div>
                    
                      <span> <img src="https://s3-figma-hubfile-images-production.figma.com/hub/file/carousel/img/62059c1aa9f12d2a785b6246f869465672cecc9a" alt="" class="meta-logo">
                     </span>
                    
                
                </div>
   
        </div>
       <!-- <hr> -->
        
         <footer>
    <div class="footer-links">
      <a href="#">About</a>
      <a href="#">Blog</a>
      <a href="#">Jobs</a>
      <a href="#">Help</a>
      <a href="#">API</a>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">contacts</a>
    </div>

    <div class="footer-language">
      <select title="Select language">
        <option>English</option>
        <option>हिन्दी</option>
        <option>Español</option>
        <option>Français</option>
        <option>gujrati</option>
      </select>
    

    <div class="footer-copy">
      © 2026 Instagram from Meta
    </div>
    </div>
   </footer>
</body>
</html>
