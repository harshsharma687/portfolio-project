<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> CALCULATOR </title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <script src="calculator.js" defer ></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
       
  <div class="calculator-container">

    <div class="calculator">

        <input type="text" placeholder="Calculator display" aria-label="Calculator display" id="number-input" disabled>

        <input type="text" placeholder="ANSWER" aria-label="Calculator display" id="result" disabled>
        <div class="buttons">

            <div class="row">
                
               <div onclick="reset()" class="col col-3 cal-buttons" id="btn">AC</div>
                <div  onclick="handleClickButton(this)"class="col col-3 cal-buttons" id="btn">M+</div>
                <div onclick="handleClickButton(this)" class="col col-3 cal-buttons" id="btn">M-</div>   
                <div onclick="handleClickButton(this)" class="col col-3 cal-buttons" id="btn">/</div>  

            </div>

            <div class="row">
                <div onclick="handleClickButton(this)" class="col col-3 cal-buttons" id="btn">7</div>
                <div onclick="handleClickButton(this)" class="col col-3 cal-buttons" id="btn">8</div>
                <div onclick="handleClickButton(this)" class="col col-3 cal-buttons" id="btn">9</div>
                <div onclick="handleClickButton(this)" class="col col-3 cal-buttons" id="btn">+</div>
            </div>

            <div class="row">
                <div onclick="handleClickButton(this)" class="col col-3 cal-buttons" id="btn">4</div>
                <div onclick="handleClickButton(this)" class="col col-3 cal-buttons" id="btn">5</div>
                <div onclick="handleClickButton(this)" class="col col-3 cal-buttons" id="btn">6</div>
                 <div  onclick="handleClickButton(this)"class="col col-3 cal-buttons" id="btn">-</div>
            </div>
              

            <div class="row">
                <div onclick="handleClickButton(this)" class="col col-3 cal-buttons" id="btn">1</div>
                <div onclick="handleClickButton(this)" class="col col-3 cal-buttons" id="btn">2</div>
                <div onclick="handleClickButton(this)" class="col col-3 cal-buttons" id="btn">3</div>
                 <div  onclick="handleClickButton(this)"class="col col-3 cal-buttons" id="btn">*</div>
            </div>
            

            <div class="row">
                <div onclick="handleClickButton(this)" class="col col-3 cal-buttons" id="btn">%</div>
                <div onclick="handleClickButton(this)" class="col col-3 cal-buttons" id="btn">0</div>
                <div onclick="handleClickButton(this)" class="col col-3 cal-buttons" id="btn">.</div>
                <div onclick="handleClickButton(this)" class="col col-3 cal-buttons" id="btn">=</div>
                
                
            </div>


        </div>

    </div>

  </div>

</body>
</html>
